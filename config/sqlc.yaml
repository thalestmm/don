version: "2"
sql:
  - engine: "postgresql"
    queries: "repository/queries"
    schema: "repository/migrations"
    gen:
      go:
        package: "repository"
        out: "repository"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "jsonb"
            go_type:
              type: "json.RawMessage"
